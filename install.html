<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>월드 빌딩 디펜스 — 앱 설치</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
	min-height: 100%;
	background: #291a0f;
	color: #f0e4d0;
	font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', system-ui, sans-serif;
}
body {
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 24px 16px;
	min-height: 100vh;
}
.frame {
	max-width: 480px;
	width: 100%;
	background: rgba(41, 26, 15, 0.95);
	border: 2px solid #8b6b3d;
	border-radius: 16px;
	padding: 28px 22px;
}
h1 {
	color: #e8c66a;
	font-size: 22px;
	margin-bottom: 8px;
	text-align: center;
}
.sub {
	color: #c4a882;
	font-size: 13px;
	text-align: center;
	margin-bottom: 20px;
	line-height: 1.5;
}
.step {
	background: rgba(92, 58, 30, 0.6);
	border: 1px solid #8b6b3d;
	border-radius: 8px;
	padding: 14px 16px;
	margin-bottom: 10px;
}
.step h3 {
	color: #e8c66a;
	font-size: 14px;
	margin-bottom: 6px;
}
.step p {
	color: #f0e4d0;
	font-size: 13px;
	line-height: 1.6;
}
.step strong {
	color: #e8c66a;
}
.btn {
	display: block;
	width: 100%;
	margin-top: 16px;
	padding: 12px;
	background: rgba(58, 58, 46, 0.6);
	color: #8b8b7a;
	border: 1px solid #5c3a1e;
	border-radius: 8px;
	font-size: 12px;
	text-decoration: none;
	text-align: center;
	cursor: pointer;
}
.btn:active { background: #5c3a1e; color: #c4a882; }
</style>
</head>
<body>
<div class="frame">
	<h1>📱 앱으로 설치해주세요</h1>
	<p class="sub">모바일 브라우저로는 주소창·시스템 UI가 게임을 가려요.<br>앱으로 설치하면 가로 전체화면으로 쾌적하게 플레이됩니다.</p>

	<div class="step">
		<h3>Android — Chrome / Samsung Internet</h3>
		<p>브라우저 메뉴(<strong>⋮</strong>) → <strong>"앱 설치"</strong> 또는 <strong>"홈 화면에 추가"</strong></p>
	</div>

	<div class="step">
		<h3>iOS — Safari</h3>
		<p>하단 <strong>공유</strong> 버튼 → <strong>"홈 화면에 추가"</strong></p>
	</div>

	<div class="step">
		<h3>설치 후</h3>
		<p>홈 화면의 <strong>월드 빌딩 디펜스</strong> 아이콘으로 실행하세요. 자동으로 가로 전체화면 진입합니다.</p>
	</div>

	<a href="./index.html?bypass=1" class="btn">그래도 웹으로 플레이</a>
</div>
</body>
</html>
