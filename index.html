(function() {
    var isStandalone = window.matchMedia("(display-mode: standalone)").matches
                    || window.matchMedia("(display-mode: fullscreen)").matches
                    || window.matchMedia("(display-mode: minimal-ui)").matches
                    || window.navigator.standalone === true;
    var isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
    var dismissed = localStorage.getItem("pwa_banner_dismissed") === "1";
    if (!isMobile || isStandalone || dismissed) return;
    document.addEventListener("DOMContentLoaded", function() {
        var bar = document.createElement("div");
        bar.id = "pwa_banner";
        bar.style.cssText = "position:fixed;left:0;right:0;bottom:0;padding:10px 14px;background:#2a1c14;color:#f5d98a;font:14px sans-serif;border-top:2px solid #8b6b3d;z-index:9999;display:flex;align-items:center;gap:10px;";
        bar.innerHTML = '<span style="flex:1">📲 홈 화면에 추가하면 풀스크린으로 플레이할 수 있어요</span>'
            + '<a href="./install.html" style="color:#f5d98a;text-decoration:underline">설치 안내</a>'
            + '<button id="pwa_banner_close" style="background:transparent;color:#c4a882;border:1px solid #8b6b3d;border-radius:4px;padding:4px 10px;cursor:pointer">닫기</button>';
        document.body.appendChild(bar);
        document.getElementById("pwa_banner_close").onclick = function() {
            localStorage.setItem("pwa_banner_dismissed", "1");
            bar.remove();
        };
    });
})();
</script>

		<script>
(function() {
    // ─────────────────────────────────────────────────────
    // 1) 버전 체크 세이프티넷 — version.json을 network-only로 가져와 저장된 버전과 다르면
    //    전체 캐시/SW 폭파 후 리로드. SW navigate 메커니즘이 어떤 이유로 실패해도 이 경로가 보증.
    var VERSION_URL = './version.json';
    fetch(VERSION_URL + '?t=' + Date.now(), {cache: 'no-store'}).then(function(r) {
        return r.ok ? r.json() : null;
    }).then(function(v) {
        if (!v || !v.version) return;
        var stored = null;
        try { stored = localStorage.getItem('_app_version'); } catch (e) {}
        if (stored && stored !== v.version) {
            var nuke = Promise.resolve();
            if ('caches' in window) {
                nuke = nuke.then(function() { return caches.keys(); }).then(function(keys) {
                    return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                });
            }
            if ('serviceWorker' in navigator) {
                nuke = nuke.then(function() { return navigator.serviceWorker.getRegistrations(); }).then(function(regs) {
                    return Promise.all(regs.map(function(r) { return r.unregister(); }));
                });
            }
            nuke.then(function() {
                try { localStorage.setItem('_app_version', v.version); } catch (e) {}
                window.location.reload();
            });
        } else if (!stored) {
            try { localStorage.setItem('_app_version', v.version); } catch (e) {}
        }
    }).catch(function() {});

    // 2) SW 업데이트 체크 — 첫 페이지 로드 시 1회만.
    //    controllerchange 리스너 + 60초 폴링 제거: 게임 플레이 중 리로드 트리거 방지.
    //    새 SW는 skipWaiting으로 즉시 활성화 → 다음 탭 새로고침/재방문에 새 버전 반영.
    //    긴급 업데이트가 필요하면 version.json 체크 경로가 캐시 폭파 + 리로드로 보증.
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.ready.then(function(reg) {
        reg.update();
    });
})();
</script>

/* ── 모바일 웹 안정화 (iOS/Android 공통) ──
   position:fixed + overscroll-behavior: iOS Safari pull-to-refresh/bounce 차단
   width/height 100%: 주소창 토글로 100vh가 튀는 문제 완화
   body padding: iOS 노치/홈 인디케이터 safe-area + Samsung 최소 여백 8px.
     max(inset, 8px)로 노치 있는 iPhone은 inset(~47px), 없는 기기는 8px 기본 여백
     → HUD/액션바가 브라우저 URL바·홈바에 바짝 붙어 잘려 보이는 증상 방지.
   canvas max-width/height 100%: body 컨텐츠 박스(패딩 제외) 기준으로 피팅.
     100vw/100vh를 쓰면 패딩을 무시하고 뷰포트 전체를 채워 safe-area가 무력화됨. */
html, body {
    overscroll-behavior: contain;
    width: 100%;
    height: 100%;
    position: fixed;
    top: 0;
    left: 0;
}
body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding-top: max(env(safe-area-inset-top), 8px);
    padding-bottom: max(env(safe-area-inset-bottom), 8px);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    box-sizing: border-box;
}
#canvas {
    max-width: 100% !important;
    max-height: 100% !important;
    width: auto !important;
    height: auto !important;
}

#status-progress::-webkit-progress-bar { background: #1a0f0a; border-radius: 4px; }

#tap-to-start {
	position: absolute; left: 0; right: 0; bottom: 100px;
	text-align: center; color: #e8c66a; font-size: 24px; font-weight: 700;
	letter-spacing: 2px; text-shadow: 0 0 6px rgba(0,0,0,0.8);
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
	pointer-events: none;
	animation: tap-blink 1.4s ease-in-out infinite;
}
@keyframes tap-blink { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }

		<script>

	// Boot 슬라이드 cycle (2.5s 간격)
	(function() {
		var idx = 0;
		var slides = document.querySelectorAll('#boot-slides .bg-slide');
		if (slides.length < 2) return;
		setInterval(function() {
			slides[idx].classList.remove('active');
			idx = (idx + 1) % slides.length;
			slides[idx].classList.add('active');
		}, 2500);
	})();

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":1,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":99115836,"index.wasm":37695054},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4,"serviceWorker":"index.service.worker.js"};
const GODOT_THREADS_ENABLED = false;
const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			// 게임 로드 끝 — TAP TO START 표시 후 사용자 탭 대기
			statusProgress.style.display = 'none';
			var tap = document.createElement('div');
			tap.id = 'tap-to-start';
			tap.textContent = 'TAP ANYWHERE TO START';
			statusOverlay.appendChild(tap);
			statusOverlay.style.cursor = 'pointer';
			var startGame = function(e) {
				if (e) e.preventDefault();
				statusOverlay.removeEventListener('click', startGame);
				statusOverlay.removeEventListener('touchstart', startGame);
				setStatusMode('hidden');
			};
			statusOverlay.addEventListener('click', startGame);
			statusOverlay.addEventListener('touchstart', startGame, { passive: false });
		}, displayFailureNotice);
	}
}());
